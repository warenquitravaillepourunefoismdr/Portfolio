<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Portfolio.css">
    <title>Contact Portfolio Waren</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
</head>
<body class="Bcontact">
    <main>
        <aside>
            <ul>
                <li><a href="Index.html">Accueil</a></li>
                <li><a href="Projets.html">Projets</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </aside>
        <content class="Ccontent">
            <section class="Titre">
                <div class = funnel_part>
                    <funnel></funnel>
                    <div class="conveyer_part">
                        <marquee scrollamount = "18">
                            <h1>Me contacter</h1>
                        </marquee>
                        <conveyer></conveyer>
                    </div>
                    <funnel></funnel>
                </div>
                <sol></sol>
            </section>

            <section class="Formulaire">
                <neon></neon>
                <div class="tabInfo">
                    <h2>Me joindre :</h2>
                    Je suis en étude au But informatique de Grenoble et ouvert aux offres de stage pour ma seconde année.
                </div>
                <poteaux class="Pg"></poteaux>
                <poteaux class="Pd"></poteaux>
                <div class="clipboard">
                    <div class="clipmetal"></div>
                    <form class="clippaper" action="https://formspree.io/f/xgoqbbba" method="post">
                        <check class="Ncheck"></check>
                        <div class="Fnom">
                            <label for="Pnom">Nom</label>
                            <input name="nom" id="Pnom" type="text" placeholder="Votre nom" required>
                        </div>
                        <check class="Pcheck"></check>
                        <div class="Fprenom">
                            <label for="Pprenom">Prenom</label>
                            <input name="prenom" id="Pprenom" type="text" placeholder="Votre prenom" required>
                        </div>
                        <check class="Echeck"></check>
                        <div class="Femail">
                            <label for="Pmail">Email</label>
                            <input name="email" id="Pmail" type="email" placeholder="JhonDoe@Xmail.com" required>
                        </div>
                        <check class="Ocheck"></check>
                        <div class="Fobjet">
                            <label for="Pobjet">Objet</label>
                            <input name="objet" id="Pobjet" type="text" placeholder="Votre sujet" required>
                        </div>
                        <check class="Mcheck"></check>
                        <div class="Fmessage">
                            <label for="Pmessage">Message</label>
                            <textarea name="message" id="Pmessage" type="text" placeholder="Le contenue de votre message" required></textarea>
                        </div>
                        <button type="submit" class="Bsend">Envoyer</button>
                    </form>
                </div>
            </section>

        </content> 
    </main>
    <footer>
            <span>Site réalisé par Ferreira de Freitas Waren en html 5 et css.</span>
    </footer>
</body>
</html>
